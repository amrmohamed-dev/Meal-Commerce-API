<section class="auth-wrap">
  <mat-card class="auth-card card-surface">
    <img class="auth-logo" [src]="logoUrl" alt="Meal Commerce logo" />
    <h1>Login</h1>
    <p class="muted">Access your account to order meals and track deliveries.</p>
    <p class="form-error" *ngIf="formError">{{ formError }}</p>

    <form class="form-grid mt-2" [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" />
        <mat-error *ngIf="email.touched && email.hasError('required')">
          Email is required.
        </mat-error>
        <mat-error *ngIf="email.touched && email.hasError('email')">
          Enter a valid email address.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" />
        <mat-error *ngIf="password.touched && password.hasError('required')">
          Password is required.
        </mat-error>
        <mat-error *ngIf="password.touched && password.hasError('minlength')">
          Password must be at least 8 characters.
        </mat-error>
      </mat-form-field>

      <button mat-flat-button class="brand-btn w-full" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <div class="links mt-2">
      <a routerLink="/auth/register">Create account</a>
      <a routerLink="/auth/reset-password">Reset password</a>
    </div>
  </mat-card>
</section>
