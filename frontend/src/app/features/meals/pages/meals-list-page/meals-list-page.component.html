<ng-container *ngIf="categoryFilterState$ | async as categoryFilterState">
  <section class="heading card-surface">
    <div class="heading__copy">
      <h1>Meals</h1>
      <p class="muted">
        Explore every dish or jump straight into a category with a faster visual filter.
      </p>
    </div>
    <button
      *ngIf="categoryFilterState.selectedCategoryId"
      mat-button
      type="button"
      class="outlined-btn clear-filter-btn"
      (click)="onCategoryChange('')"
    >
      Clear Filter
    </button>
  </section>

  <section class="category-filter card-surface mt-2">
    <div class="category-filter__header">
      <div>
        <p class="category-filter__eyebrow">Quick Filters</p>
        <h2>Filter by Category</h2>
      </div>
      <p class="muted category-filter__hint">
        Pick a category card to refresh the meal list instantly.
      </p>
    </div>

    <div *ngIf="categoryFilterState.loading" class="category-filter__loading">
      <mat-spinner diameter="34"></mat-spinner>
    </div>

    <div *ngIf="!categoryFilterState.loading" class="category-filter__grid">
      <button
        type="button"
        class="category-filter-card category-filter-card--all"
        [class.is-active]="!categoryFilterState.selectedCategoryId"
        [attr.aria-pressed]="!categoryFilterState.selectedCategoryId"
        (click)="onCategoryChange('')"
      >
        <span class="category-filter-card__icon-wrap">
          <mat-icon>grid_view</mat-icon>
        </span>
        <span class="category-filter-card__label">All Meals</span>
        <span class="category-filter-card__meta">Browse the full menu</span>
      </button>

      <button
        type="button"
        class="category-filter-card"
        *ngFor="let category of categoryFilterState.data"
        [class.is-active]="category.isSelected"
        [attr.aria-pressed]="category.isSelected"
        (click)="onCategoryChange(category._id)"
      >
        <span class="category-filter-card__image-wrap">
          <img
            class="category-filter-card__image"
            [src]="category.image?.url || categoryFallbackImage"
            [alt]="category.name"
            loading="lazy"
          />
        </span>
        <span class="category-filter-card__label">{{ category.name | titlecase }}</span>
        <span class="category-filter-card__meta">
          Browse {{ category.name | lowercase }} meals
        </span>
      </button>
    </div>
  </section>
</ng-container>

<ng-container *ngIf="mealsState$ | async as mealsState">
  <div *ngIf="mealsState.loading" class="loading-wrap">
    <mat-spinner diameter="42"></mat-spinner>
  </div>

  <section *ngIf="!mealsState.loading && mealsState.data.length === 0" class="card-surface empty">
    <img
      class="empty-logo"
      src="https://res.cloudinary.com/dudarfssg/image/upload/v1772379053/meal-commerce_logo-removebg-preview_1_1_xly0hu.png"
      alt="Meal Commerce logo"
    />
    <mat-icon>restaurant_menu</mat-icon>
    <h2>No meals found</h2>
    <p class="muted">Try another category or clear the filter to view all meals.</p>
    <a mat-flat-button class="brand-btn" [routerLink]="['/meals']">Show All Meals</a>
  </section>

  <section class="grid-auto mt-2" *ngIf="!mealsState.loading && mealsState.data.length > 0">
    <app-meal-card *ngFor="let meal of mealsState.data" [meal]="meal"></app-meal-card>
  </section>
</ng-container>
