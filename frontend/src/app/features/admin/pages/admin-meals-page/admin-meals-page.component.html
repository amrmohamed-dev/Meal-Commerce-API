<section class="page">
  <mat-card class="card-surface panel">
    <h1>{{ editingMealId ? 'Edit Meal' : 'Create Meal' }}</h1>
    <form class="form-grid mt-2" [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea matInput rows="3" formControlName="description"></textarea>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" min="1" formControlName="price" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option *ngFor="let category of categories" [value]="category._id">
            {{ category.name | titlecase }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Preparation Time (mins)</mat-label>
        <input matInput type="number" min="1" formControlName="preparationTime" />
      </mat-form-field>

      <label class="file-input">
        <input type="file" accept="image/*" (change)="onFileSelected($event)" />
        Choose image
      </label>

      <div class="form-actions">
        <button mat-flat-button class="brand-btn" [disabled]="busy">
          {{ busy ? 'Saving...' : editingMealId ? 'Update' : 'Create' }}
        </button>
        <button *ngIf="editingMealId" mat-button type="button" (click)="cancelEdit()">
          Cancel
        </button>
      </div>
    </form>
  </mat-card>

  <mat-card class="card-surface panel mt-2">
    <h2>Meals</h2>
    <div class="grid" *ngIf="!loading">
      <article class="item" *ngFor="let meal of meals">
        <img [src]="meal.image.url || 'https://placehold.co/400x260?text=Meal'" [alt]="meal.name" />
        <div class="meta">
          <h3>{{ meal.name | titlecase }}</h3>
          <p class="muted">
            {{ meal.price | currency: 'USD' : 'symbol' : '1.0-0' }} • {{ meal.preparationTime }} mins
          </p>
        </div>
        <div class="actions">
          <button mat-button (click)="edit(meal)">Edit</button>
          <button mat-button color="warn" (click)="deleteMeal(meal._id)">Delete</button>
        </div>
      </article>
    </div>
  </mat-card>
</section>
