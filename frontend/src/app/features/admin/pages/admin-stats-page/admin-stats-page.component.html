<section class="page card-surface">
  <h1>Order Analytics</h1>
  <p class="muted">Aggregated order metrics grouped by current status.</p>

  <div class="stats-grid" *ngIf="!loading">
    <article class="stat-card" *ngFor="let stat of stats">
      <h2>{{ stat._id | titlecase }}</h2>
      <p><strong>Orders:</strong> {{ stat.nOrders }}</p>
      <p>
        <strong>Total Revenue:</strong>
        {{ stat.totalRevenue | currency: 'USD' : 'symbol' : '1.0-0' }}
      </p>
      <p>
        <strong>Avg Order:</strong>
        {{ stat.avgOrderPrice | currency: 'USD' : 'symbol' : '1.0-0' }}
      </p>
    </article>
  </div>
</section>
