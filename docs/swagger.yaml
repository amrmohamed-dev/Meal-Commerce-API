          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/orders/me:
    get:
      tags: [Orders]
      summary: Get current user's orders
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user's orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/orders/{id}:
    get:
      tags: [Orders]
      summary: Get one order
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{id}/cancel:
    patch:
      tags: [Orders]
      summary: Cancel an order
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update an order's status
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
    CategoryId:
      in: path
      name: id
      required: true
      schema:
        type: string
    MealId:
      in: path
      name: mealId
      required: true
      schema:
        type: string
    MealPathId:
      in: path
      name: id
      required: true
      schema:
        type: string
    ReviewId:
      in: path
      name: id
      required: true
      schema:
        type: string
    OrderId:
      in: path
      name: id
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid jwt cookie
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [fail, error]
        message:
          type: string

    MessageResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: success
        message:
          type: string

    LogoutResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: success

    ImageAsset:
      type: object
      properties:
        url:
          type: string
          nullable: true
        publicId:
          type: string
          nullable: true

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        notes:
          type: string

    ShippingAddress:
      type: object
      required: [street, city, phone]
      properties:
        street:
          type: string
        city:
          type: string
        phone:
          type: string

    CategorySummary:
      type: object
      required: [_id, name]
      properties:
        _id:
          type: string
        name:
          type: string

    Category:
      allOf:
        - $ref: '#/components/schemas/CategorySummary'
        - type: object
          properties:
            image:
              $ref: '#/components/schemas/ImageAsset'

    MealNameReference:
      type: object
      required: [_id, name]
      properties:
        _id:
          type: string
        name:
          type: string

    MealSummary:
      type: object
      required: [_id, name]
      properties:
        _id:
          type: string
        name:
          type: string
        price:
          type: number
        image:
          $ref: '#/components/schemas/ImageAsset'

    User:
      type: object
      required: [_id, name, email, role]
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        image:
          $ref: '#/components/schemas/ImageAsset'
        favouriteMeals:
          type: array
          items:
            $ref: '#/components/schemas/FavouriteMeal'
        createdAt:
          type: string
          format: date-time

    Meal:
      type: object
      required:
        - _id
        - name
        - description
        - price
        - ratingAverage
        - ratingQuantity
        - category
        - image
        - preparationTime
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        ratingAverage:
          type: number
        ratingQuantity:
          type: integer
        category:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/CategorySummary'
            - $ref: '#/components/schemas/Category'
        image:
          $ref: '#/components/schemas/ImageAsset'
        preparationTime:
          type: number
        createdAt:
          type: string
          format: date-time

    FavouriteMeal:
      type: object
      required: [meal, addedAt]
      properties:
        meal:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/MealSummary'
            - $ref: '#/components/schemas/Meal'
        addedAt:
          type: string
          format: date-time

    Review:
      type: object
      required: [_id, meal, user, rating, createdAt]
      properties:
        _id:
          type: string
        meal:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/MealNameReference'
            - $ref: '#/components/schemas/Meal'
        user:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/User'
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    CartItem:
      type: object
      required: [meal, quantity, price]
      properties:
        meal:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/MealSummary'
            - $ref: '#/components/schemas/Meal'
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          minimum: 0

    Cart:
      type: object
      required: [user, cartItems, totalPrice]
      properties:
        _id:
          type: string
        user:
          type: string
        cartItems:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number

    Order:
      type: object
      required:
        - _id
        - user
        - cartItems
        - totalPrice
        - status
        - paymentMethod
        - isPaid
        - shippingAddress
        - createdAt
      properties:
        _id:
          type: string
        user:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/User'
        cartItems:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, preparing, shipped, delivered, cancelled]
        paymentMethod:
          type: string
          enum: [cash, card]
        isPaid:
          type: boolean
        paidAt:
          type: string
          format: date-time
          nullable: true
        shippingAddress:
          $ref: '#/components/schemas/ShippingAddress'
        createdAt:
          type: string
          format: date-time

    OrderStat:
      type: object
      required: [_id, nOrders, totalRevenue, avgOrderPrice]
      properties:
        _id:
          type: string
          enum: [pending, confirmed, preparing, shipped, delivered, cancelled]
        nOrders:
          type: integer
        totalRevenue:
          type: number
        avgOrderPrice:
          type: number

    RegisterRequest:
      type: object
      required: [name, email, password, passwordConfirm]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 35
        email:
          type: string
          format: email
        password:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'
        passwordConfirm:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: demo@mealcommerce.com
        password:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'
          example: demo1234

    SendOtpRequest:
      type: object
      properties:
        email:
          type: string
          format: email

    VerifyEmailRequest:
      type: object
      required: [otp]
      properties:
        otp:
          type: string

    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string

    ResetPasswordRequest:
      type: object
      required: [email, otp, password, passwordConfirm]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
        password:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'
        passwordConfirm:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'

    UpdatePasswordRequest:
      type: object
      required: [currentPassword, password, passwordConfirm]
      properties:
        currentPassword:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'
        password:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'
        passwordConfirm:
          type: string
          pattern: '^[a-zA-Z0-9]{8,30}$'

    UpdateMeRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    AdminCreateUserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        isVerified:
          type: boolean

    AdminUpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        isVerified:
          type: boolean

    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [user, admin]

    CategoryFormData:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image:
          type: string
          format: binary

    MealFormData:
      type: object
      required: [name, description, price, categoryId, preparationTime, image]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        categoryId:
          type: string
        preparationTime:
          type: number
        image:
          type: string
          format: binary

    MealFormDataUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        categoryId:
          type: string
        preparationTime:
          type: number
        image:
          type: string
          format: binary

    CreateReviewRequest:
      type: object
      required: [mealId, rating]
      properties:
        mealId:
          type: string
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string

    AddToCartRequest:
      type: object
      required: [mealId]
      properties:
        mealId:
          type: string
        quantity:
          type: integer
          minimum: 1

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    CreateOrderRequest:
      type: object
      required: [shippingAddress]
      properties:
        shippingAddress:
          $ref: '#/components/schemas/ShippingAddress'

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, shipped, delivered, cancelled]

    AuthResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/User'

    UserResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/User'

    UserMutationResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/User'

    UsersResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [users]
          properties:
            users:
              type: array
              items:
                $ref: '#/components/schemas/User'

    AdminCreateUserResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: '#/components/schemas/User'

    FavouriteMealsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          required: [favouriteMeals]
          properties:
            favouriteMeals:
              type: array
              items:
                $ref: '#/components/schemas/FavouriteMeal'

    CategoryResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [category]
          properties:
            category:
              $ref: '#/components/schemas/Category'

    CategoriesResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [categories]
          properties:
            categories:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    MealResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [meal]
          properties:
            meal:
              $ref: '#/components/schemas/Meal'

    MealMutationResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          type: object
          required: [meal]
          properties:
            meal:
              $ref: '#/components/schemas/Meal'

    MealsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [meals]
          properties:
            meals:
              type: array
              items:
                $ref: '#/components/schemas/Meal'

    ReviewResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [review]
          properties:
            review:
              $ref: '#/components/schemas/Review'

    ReviewsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [reviews]
          properties:
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Review'

    CartResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [cart]
          properties:
            cart:
              $ref: '#/components/schemas/Cart'

    OrderResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [order]
          properties:
            order:
              $ref: '#/components/schemas/Order'

    OrdersResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [orders]
          properties:
            orders:
              type: array
              items:
                $ref: '#/components/schemas/Order'

    OrderStatsResponse:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          required: [stats]
          properties:
            stats:
              type: array
              items:
                $ref: '#/components/schemas/OrderStat'
