  /api/v1/cart:
    get:
      tags: [Cart]
      summary: Get current user's cart
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Cart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Cart]
      summary: Add a meal to cart
      security:
        - cookieAuth: []
      requestBody:
