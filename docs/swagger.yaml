        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/me/favourites/{mealId}:
    patch:
      tags: [Users]
      summary: Toggle a meal in favourites
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/MealId'
      responses:
        '200':
          description: Favourite updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteMealsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/me/photo:
    patch:
      tags: [Users]
      summary: Upload or replace profile photo
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Photo uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Users]
      summary: Delete profile photo
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Photo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users:
    get:
      tags: [Users]
      summary: Get all users
      security:
        - cookieAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
