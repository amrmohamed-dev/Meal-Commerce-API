    delete:
      tags: [Cart]
      summary: Remove a meal from cart
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/MealId'
      responses:
        '200':
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
