# NOTE:
# Authentication is handled via httpOnly cookies.
# When testing protected endpoints in Swagger UI:
# 1. Call /auth/login first
# 2. Cookie will be set automatically by the browser

openapi: 3.0.3
info:
  title: Meal-Commerce API
  version: 1.0.0
  description: |-
    REST API for Meal-Commerce (food ordering) using Express, MongoDB, and JWT authentication via httpOnly cookies.
    API routes are mounted under `/api/v1`.

    🔑 Demo Account (User):

    ```
    email: demo@mealcommerce.com
    password: demo1234
    ```

    Note:
    - This account is already verified and ready to use.
    - OTP flow may not work in production.
    - Use this account to test authenticated endpoints.
externalDocs:
  description: View full project on GitHub
  url: https://github.com/amrmohamed-dev/Meal-commerce-API
tags:
  - name: Auth
  - name: Users
  - name: Categories
  - name: Meals
  - name: Reviews
  - name: Cart
  - name: Orders
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/send-otp/{purpose}:
    post:
      tags: [Auth]
      summary: Send an OTP email
      parameters:
        - in: path
          name: purpose
          required: true
          schema:
            type: string
            enum: [Email Confirmation, Password Recovery]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOtpRequest'
      responses:
        '200':
          description: OTP flow started
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MessageResponse'
                  - $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/verify-email:
    patch:
      tags: [Auth]
      summary: Verify the current user's email
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/verify-otp/{purpose}:
    post:
      tags: [Auth]
      summary: Verify an OTP code
      parameters:
        - in: path
          name: purpose
          required: true
          schema:
            type: string
            enum: [Email Confirmation, Password Recovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/reset-password:
    patch:
      tags: [Auth]
      summary: Reset password using OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/logout:
    get:
      tags: [Auth]
      summary: Log out
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update current user profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Users]
      summary: Delete current user
      security:
        - cookieAuth: []
      responses:
        '204':
          description: User deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/me/update-password:
    patch:
      tags: [Users]
      summary: Update current user password
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/me/favourites:
    get:
      tags: [Users]
      summary: Get current user's favourite meals
      security:
